<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IFC-Visual Identity</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
    }

    .page {
      width: min(100%, 1920px);
      margin: 0 auto;
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
      border: 0;
    }
  </style>
</head>

<body>
  <main class="page">
    <img src="1.png" alt="1" />
    <img src="2.png" alt="2" />

    <img src="4.png" alt="4" />
    <img src="5.png" alt="5" />
    <img src="6.png" alt="6" />
    <img src="7.png" alt="7" />
  </main>
</body>
</html>
